services:
  - type: web
    name: finsightiq-api
    runtime: node
    plan: standard
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: finsightiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finsightiq-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /v1/health

  - type: database
    name: finsightiq-db
    plan: standard
    databaseName: finsightiq
    user: finsightiq

  - type: redis
    name: finsightiq-redis
    plan: standard

  - type: worker
    name: finsightiq-worker
    runtime: node
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finsightiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finsightiq-redis
          property: connectionString
